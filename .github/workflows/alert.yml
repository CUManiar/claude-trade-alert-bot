name: Nifty Alert

on:
  schedule:
    # Every 15 mins, Mon-Fri, 9:15 AM to 3:15 PM IST
    # IST = UTC+5:30, so 9:15 IST = 3:45 UTC
    - cron: "45,0,15,30 3 * * 1-5" # 9:15, 9:30, 9:45, 10:00 IST
    - cron: "45,0,15,30 4 * * 1-5" # 10:15 to 11:00 IST
    - cron: "45,0,15,30 5 * * 1-5" # 11:15 to 12:00 IST
    - cron: "45,0,15,30 6 * * 1-5" # 12:15 to 13:00 IST
    - cron: "45,0,15,30 7 * * 1-5" # 13:15 to 14:00 IST
    - cron: "45,0,15,30 8 * * 1-5" # 14:15 to 15:00 IST
    - cron: "10 9 * * 1-5" # 14:40 IST = 3:10 PM force close alert
  workflow_dispatch: # manual trigger for testing

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas pytz

      - name: Run alert script
        env:
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python nifty_alert.py
